[theme]
base = "dark"
# Primary accent color for interactive elements (Neon Cyan)
primaryColor = "#00f3ff"

# Background color for the main content area (Azul Corporativo Claro/Medio)
backgroundColor = "#0A2540"

# Background color used for the sidebar and most interactive widgets (Azul Corporativo más intenso)
secondaryBackgroundColor = "#1E3A8A"

# Color used for almost all text
textColor = "#ffffff"

# Font family for all text in the app
font = "sans serif"
